name: Update EPG

on:
  schedule:
    # Runs every day at 02:00 AM UTC automatically
    - cron: '0 2 * * *'
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  grab-epg:
    runs-on: ubuntu-latest
    steps:
      # 1. Try multiple EPG sources with fallback
      - name: Download Global EPG
        run: |
          echo "=== Attempting EPG download ==="
          
          # Source 1: iptv-org GitHub-hosted guides (most reliable, no Cloudflare)
          echo "Trying iptv-org guides..."
          wget -q --timeout=60 "https://iptv-org.github.io/epg/guides/en.xml.gz" -O guide.xml.gz 2>/dev/null && echo "SUCCESS: iptv-org" && exit 0
          
          # Source 2: epg.pw global file (correct filename: epg.xml.gz, NOT epg_EN.xml.gz)
          echo "Trying epg.pw global..."
          wget -q --timeout=60 --header="User-Agent: Mozilla/5.0 (X11; Linux x86_64; rv:120.0) Gecko/20100101 Firefox/120.0" "https://epg.pw/xmltv/epg.xml.gz" -O guide.xml.gz 2>/dev/null && echo "SUCCESS: epg.pw global" && exit 0
          
          # Source 3: epg.pw US-specific
          echo "Trying epg.pw US..."
          wget -q --timeout=60 --header="User-Agent: Mozilla/5.0 (X11; Linux x86_64; rv:120.0) Gecko/20100101 Firefox/120.0" "https://epg.pw/xmltv/epg_US.xml.gz" -O guide.xml.gz 2>/dev/null && echo "SUCCESS: epg.pw US" && exit 0
          
          # Source 4: epg.pw UK-specific
          echo "Trying epg.pw GB..."
          wget -q --timeout=60 --header="User-Agent: Mozilla/5.0 (X11; Linux x86_64; rv:120.0) Gecko/20100101 Firefox/120.0" "https://epg.pw/xmltv/epg_GB.xml.gz" -O guide.xml.gz 2>/dev/null && echo "SUCCESS: epg.pw GB" && exit 0
          
          echo "ERROR: All EPG sources failed!"
          exit 1
          
      # 2. Verify the file is valid (not empty or an error page)
      - name: Verify EPG File
        run: |
          FILE_SIZE=$(stat -c%s guide.xml.gz)
          echo "Downloaded file size: ${FILE_SIZE} bytes"
          if [ "$FILE_SIZE" -lt 1000 ]; then
            echo "ERROR: File too small (${FILE_SIZE} bytes), likely not a valid EPG"
            exit 1
          fi
          echo "File looks valid!"

      # 3. Save the downloaded file as a temporary artifact
      - name: Upload EPG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: epg-guide
          path: guide.xml.gz

  publish-epg:
    needs: grab-epg
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 4. Download the artifact from the previous step
      - name: Download EPG Artifact
        uses: actions/download-artifact@v4
        with:
          name: epg-guide

      # 5. Push it directly to your permanent GitHub Pages branch
      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Automated Global EPG Update"
