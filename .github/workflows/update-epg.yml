name: Update EPG

on:
  schedule:
    # Runs every day at 02:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch: 

jobs:
  grab-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Download Global EPG
        run: |
          echo "=== Downloading Massive Raw EPG ==="
          wget -q --timeout=60 "https://iptv-org.github.io/epg/guides/en.xml.gz" -O guide_raw.xml.gz 2>/dev/null || \
          wget -q --timeout=60 --header="User-Agent: Mozilla/5.0" "https://epg.pw/xmltv/epg.xml.gz" -O guide_raw.xml.gz
          
      - name: Run Python Optimizer
        run: python filter_epg.py

      - name: Upload Lean Artifact
        uses: actions/upload-artifact@v4
        with:
          name: epg-guide
          path: guide.xml.gz

  publish-epg:
    needs: grab-epg
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: epg-guide

      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Automated Lean EPG Update"
