name: Update EPG

on:
  schedule:
    # Runs every day at 02:00 AM UTC automatically
    - cron: '0 2 * * *'
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  grab-epg:
    runs-on: ubuntu-latest
    steps:
      # 1. Download the massive master EPG file from epg.pw directly
      - name: Download Global EPG
        run: |
          wget --header="User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64)" https://epg.pw/xmltv/epg_EN.xml.gz -O guide.xml.gz
          
      # 2. Save the downloaded file as a temporary artifact
      - name: Upload EPG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: epg-guide
          path: guide.xml.gz

  publish-epg:
    needs: grab-epg
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 3. Download the artifact from the previous step
      - name: Download EPG Artifact
        uses: actions/download-artifact@v4
        with:
          name: epg-guide

      # 4. Push it directly to your permanent GitHub Pages branch
      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Automated Global EPG Update"
